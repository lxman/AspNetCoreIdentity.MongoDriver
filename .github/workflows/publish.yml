name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore AspNetCore.Identity.MongoDriver/AspNetCoreIdentity.MongoDriver.csproj

      - name: Build
        run: >
          dotnet build AspNetCore.Identity.MongoDriver/AspNetCoreIdentity.MongoDriver.csproj
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}
          -p:FileVersion=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true
          -p:GeneratePackageOnBuild=false

      - name: Pack
        run: >
          dotnet pack AspNetCore.Identity.MongoDriver/AspNetCoreIdentity.MongoDriver.csproj
          --configuration Release
          --no-build
          -p:Version=${{ steps.version.outputs.version }}
          -p:FileVersion=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version }}
          --output ./artifacts

      - name: Push to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
